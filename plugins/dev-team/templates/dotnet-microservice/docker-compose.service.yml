services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: {{DbName}}
      POSTGRES_USER: {{DbUser}}
      POSTGRES_PASSWORD: {{DbPassword}}
    ports:
      - "{{DbPort}}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{DbUser}}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
